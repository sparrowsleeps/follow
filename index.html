    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #1a1a2e;

      flex-direction: column;

    }
    .btn-list {

      gap: 14px;
      width: 100%;

    }
    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      width: 100%;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-label { flex: 1; text-align: left; }
    .btn-sub {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.7;
      display: block;
      margin-top: 1px;
    }
    .btn-action { font-size: 12px; opacity: 0.6; }
    .btn-instagram { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); color: #fff; }
    .btn-tiktok { background: #111; color: #fff; border: 1px solid rgba(255,255,255,0.12); }
    .btn-facebook { background: #1877f2; color: #fff; }
    .btn-spotify { background: #1db954; color: #fff; }
    .btn-apple { background: linear-gradient(135deg, #fc3c44, #cc0a0a); color: #fff; }
